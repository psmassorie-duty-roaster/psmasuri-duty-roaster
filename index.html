<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PS Masuri Duty Roster</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>

<body>

<header>

<h1>🚔 PS Masuri Duty Roster</h1>

<p>Police Station Masuri | Commissionerate Ghaziabad</p>

</header>

<div class="topbar">

<input
type="file"
id="excelFile"
accept=".xlsx,.xls">

<button onclick="uploadExcel()">
📤 Upload Excel
</button>

<input
type="text"
id="search"
placeholder="Search Name / PNO / Mobile"
onkeyup="searchData()">

<button onclick="window.print()">
🖨 Print
</button>

</div>

<div id="status">

No File Uploaded

</div>

<table id="dutyTable">

<thead>

<tr>

<th>Section</th>

<th>PNO</th>

<th>Name</th>

<th>Mobile</th>

<th>Duty</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

<script src="script.js"></script>

</body>
</html>
<select id="sectionFilter" onchange="filterSection()">

<option value="">सभी शाखा / चौकी</option>

</select>
